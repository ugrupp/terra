<div class="c-prktt-info">
  {{ with .Resources.GetMatch "info.md" }}
    {{/* Content */}}
    <div class="c-prktt-info__content">
      <div class="o-container">
        <div class="o-grid">
          <div class="o-grid__col"></div>
          <div class="o-grid__col" data-reveal>
            <div class="o-grid__col-inner o-grid__col-inner--narrow">
              <div class="c-richtext">
                {{ .Params.text | markdownify }}
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    {{/* Image */}}
    <div class="c-prktt-info__img-wrapper">
      {{ with $.Resources.GetMatch .Params.image }}
        {{ $imageSmall := .Resize "500x" }}
        {{ $imageMedium := .Resize "1000x" }}
        {{ $imageBig := .Resize "2000x" }}

        <img
          alt=""
          src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw=="
          data-src="{{ $imageSmall.RelPermalink }}"
          data-srcset="{{ $imageSmall.RelPermalink }} 500w, {{ $imageMedium.RelPermalink }} 1000w, {{ $imageBig.RelPermalink }} 2000w"
          data-sizes="auto"
          class="c-prktt-info__img lazyload" />
      {{ end }}
    </div>
  {{ end }}
</div>
